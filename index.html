<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Starryz5</title>
    <link rel="icon" type="image/png" href="https://firebasestorage.googleapis.com/v0/b/wikistars5-465e1.firebasestorage.app/o/wikistars5logo.png?alt=media&token=026f822e-3b69-4538-b0ef-28dacb65551e" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <script>
      // Script maestro con "candado" para ejecutarse UNA SOLA VEZ por usuario
      if ('serviceWorker' in navigator && !localStorage.getItem('sw_cleaned_v1')) {
        // Marcamos inmediatamente que este navegador ya fue limpiado
        localStorage.setItem('sw_cleaned_v1', 'true');
        
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister().then(function(clean) {
              if (clean) {
                console.log('Cache vieja destruida con éxito.');
                window.location.reload();
              }
            });
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
