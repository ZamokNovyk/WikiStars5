<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1917" />
      <stop offset="100%" stop-color="#0c0a09" />
    </radialGradient>
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="60%" stop-color="#facc15" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <drop-shadow dx="0" dy="8" stdDeviation="12" flood-color="#facc15" flood-opacity="0.35" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Rectangle Background (Maskable Area compliance) -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" stroke="#292524" stroke-width="6"/>
  
  <!-- Subtle inner decorative concentric circles -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#facc15" stroke-width="2" stroke-dasharray="12 12" opacity="0.15" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#292524" stroke-dasharray="8 8" stroke-width="1.5" />
  
  <g filter="url(#glow)">
    <!-- Elegant Stylized Star -->
    <path d="M 256,90 L 297,185 L 398,193 L 321,260 L 345,360 L 256,305 L 167,360 L 191,260 L 114,193 L 215,185 Z" fill="url(#star-grad)" />
    
    <!-- Modern '5' integrated beautifully inside / overlapping the star -->
    <text x="256" y="278" font-family="'Inter', -apple-system, sans-serif" font-weight="900" font-size="82" fill="#000000" text-anchor="middle" dominant-baseline="middle" letter-spacing="-2" opacity="0.95">5</text>
  </g>
</svg>
